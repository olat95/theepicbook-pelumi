---
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'
  become: yes

- name: Clone EpicBook repository
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: main
    force: yes
  become: yes

- name: Set app directory ownership to azureuser
  file:
    path: "{{ app_dir }}"
    owner: azureuser
    group: azureuser
    recurse: yes
  become: yes

- name: Deploy config/config.json for Sequelize
  template:
    src: config.json.j2
    dest: "{{ app_dir }}/config/config.json"
    owner: azureuser
    group: azureuser
    mode: '0644'
  become: yes

- name: Install mysql-client
  apt:
    name: mysql-client
    state: present
  become: yes

- name: Create bookstore database
  shell: |
    mysql -h {{ db_host }} -u {{ db_user }} -p{{ db_password }} \
      --ssl-mode=REQUIRED \
      -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
  changed_when: false
  become: no

- name: Install npm dependencies
  npm:
    path: "{{ app_dir }}"
    state: present
  become: yes

- name: Install PM2 globally
  npm:
    name: pm2
    global: yes
  become: yes

- name: Kill any process on port 8080
  shell: fuser -k 8080/tcp || true
  changed_when: false
  become: yes

- name: Stop existing PM2 epicbook process as azureuser
  shell: pm2 delete epicbook || true
  changed_when: false
  become: yes
  become_user: azureuser

- name: Stop root PM2 daemon if running
  shell: pm2 kill || true
  changed_when: false
  become: yes

- name: Start EpicBook with PM2 as azureuser
  shell: pm2 start {{ app_dir }}/server.js --name epicbook
  args:
    chdir: "{{ app_dir }}"
  become: yes
  become_user: azureuser

- name: Wait for app to start and create tables
  wait_for:
    port: "{{ app_port }}"
    delay: 5
    timeout: 30

- name: Check if author table has data
  shell: |
    mysql -h {{ db_host }} -u {{ db_user }} -p{{ db_password }} \
      --ssl-mode=REQUIRED \
      -e "SELECT COUNT(*) FROM {{ db_name }}.author;" -s --skip-column-names
  register: author_count
  changed_when: false
  become: no

- name: Seed author data
  shell: |
    mysql -h {{ db_host }} -u {{ db_user }} -p{{ db_password }} \
      --ssl-mode=REQUIRED \
      {{ db_name }} < {{ app_dir }}/db/author_seed.sql
  when: author_count.stdout | trim == "0"
  become: no

- name: Seed books data
  shell: |
    mysql -h {{ db_host }} -u {{ db_user }} -p{{ db_password }} \
      --ssl-mode=REQUIRED \
      {{ db_name }} < {{ app_dir }}/db/books_seed.sql
  when: author_count.stdout | trim == "0"
  become: no

- name: Save PM2 process list as azureuser
  shell: pm2 save
  changed_when: false
  become: yes
  become_user: azureuser

- name: Setup PM2 startup via systemd as azureuser
  shell: pm2 startup systemd -u azureuser --hp /home/azureuser
  register: pm2_startup
  changed_when: false
  become: yes

- name: Enable PM2 service for azureuser
  systemd:
    name: pm2-azureuser
    enabled: yes
    state: started
  become: yes
