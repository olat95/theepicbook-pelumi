trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Ansible
  displayName: 'Configure and Deploy EpicBook'
  jobs:
  - job: AnsibleDeploy
    displayName: 'Run Ansible Playbook'
    steps:

    - task: DownloadSecureFile@1
      name: sshPrivateKey
      displayName: 'Download SSH Private Key'
      inputs:
        secureFile: 'id_rsa'

    - script: |
        mkdir -p ~/.ssh
        cp $(sshPrivateKey.secureFilePath) ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "SSH private key staged"
      displayName: 'Stage SSH Private Key'

    - script: |
        sudo apt-get update -y
        sudo apt-get install -y python3-pip python3-venv
        python3 -m venv ~/.venv
        source ~/.venv/bin/activate
        pip install ansible
        ansible --version
      displayName: 'Install Ansible'

    - script: |
        source ~/.venv/bin/activate
        sed -i "s/APP_PUBLIC_IP/$(APP_PUBLIC_IP)/" $(System.DefaultWorkingDirectory)/ansible/inventory.ini
        sed -i "s/MYSQL_FQDN/$(MYSQL_FQDN)/" $(System.DefaultWorkingDirectory)/ansible/group_vars/app.yml
        echo "Inventory:"
        cat $(System.DefaultWorkingDirectory)/ansible/inventory.ini
        echo "Group vars:"
        cat $(System.DefaultWorkingDirectory)/ansible/group_vars/app.yml
      displayName: 'Update Inventory and Variables'

    - script: |
        source ~/.venv/bin/activate
        cd $(System.DefaultWorkingDirectory)/ansible
        ansible-playbook site.yml -v
      displayName: 'Run Ansible Playbook'
